services:
  db:
    image: postgres:16-alpine
    container_name: legiskids-db
    environment:
      POSTGRES_DB: legiskids
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - legiskids_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legiskids"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  legiskids_db_data:
