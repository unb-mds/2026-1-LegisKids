site_name: LegisKids
site_description: Plataforma de monitoramento e análise de proposições legislativas sobre proteção de crianças na internet
site_author: Squad 08 - MDS 2026/1
site_url: https://unb-mds.github.io/2026-1-LegisKids/

repo_name: unb-mds/2026-1-LegisKids
repo_url: https://github.com/unb-mds/2026-1-LegisKids

theme:
  name: material
  language: pt-BR
  logo: assets/images/logo-legiskids.png
  favicon: assets/images/logo-legiskids.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/unb-mds/2026-1-LegisKids

extra_css:
  - stylesheets/custom.css

