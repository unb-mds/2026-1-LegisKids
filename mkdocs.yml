site_name: LegisKids – Proteção de Crianças na Internet
site_description: Plataforma de monitoramento e análise de proposições legislativas
site_author: Equipe do Projeto
site_url: https://unb-mds.github.io/2026-1-LegisKids/

theme:
  name: material

  language: pt-BR

  palette:

    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro

    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite
  - pymdownx.snippets

  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/unb-mds/2026-1-LegisKids

